<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background pill -->
  <rect width="32" height="32" rx="6" fill="#171717"/>
  <!-- Left bar — taller -->
  <rect x="5" y="9" width="5" height="15" rx="1.5" fill="white"/>
  <!-- Right bar — shorter -->
  <rect x="22" y="14" width="5" height="10" rx="1.5" fill="white"/>
  <!-- Diagonal connecting top of left bar to top of right bar -->
  <line x1="10" y1="10.5" x2="22" y2="15.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
